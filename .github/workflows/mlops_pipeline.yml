name: MLOps CI/CD Pipeline — Heart Disease Prediction

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run drift detection daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force model retraining'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.10'
  MLFLOW_TRACKING_URI: mlruns

jobs:
  # ─── 1. Code Quality & Tests ──────────────────────────────────────────────
  test:
    name: 🧪 Tests & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black isort

      - name: Lint with flake8
        run: flake8 src/ --max-line-length=120 --ignore=E203,W503

      - name: Check formatting with black
        run: black --check src/

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─── 2. Data Pipeline ─────────────────────────────────────────────────────
  data-pipeline:
    name: 📊 Data Pipeline (DVC)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate / pull data
        run: |
          python src/preprocess.py --generate --samples 1025
          echo "✓ Data preprocessed"

      - name: DVC data versioning
        run: |
          pip install dvc
          dvc init --no-scm 2>/dev/null || true
          dvc add data/processed/heart_disease.csv 2>/dev/null || true
          echo "✓ Data versioned with DVC"

      - name: Cache processed data
        uses: actions/cache@v4
        with:
          path: data/processed/
          key: processed-data-${{ hashFiles('src/preprocess.py') }}

  # ─── 3. Drift Detection ───────────────────────────────────────────────────
  drift-detection:
    name: 🔍 Drift Detection
    runs-on: ubuntu-latest
    needs: data-pipeline
    outputs:
      should_retrain: ${{ steps.drift.outputs.should_retrain }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached data
        uses: actions/cache@v4
        with:
          path: data/processed/
          key: processed-data-${{ hashFiles('src/preprocess.py') }}

      - name: Generate preprocessed data if not cached
        run: |
          if [ ! -f data/processed/heart_disease.csv ]; then
            python src/preprocess.py --generate
          fi

      - name: Run drift detection
        id: drift
        run: |
          python src/drift_detection.py --drift-factor 0.3
          if [ $? -ne 0 ]; then
            echo "should_retrain=true" >> $GITHUB_OUTPUT
            echo "⚠️ Drift detected — retraining will be triggered"
          else
            echo "should_retrain=false" >> $GITHUB_OUTPUT
            echo "✅ No drift detected"
          fi

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: monitoring/drift_reports/
          retention-days: 30

  # ─── 4. Model Training ────────────────────────────────────────────────────
  train:
    name: 🤖 Model Training & Evaluation
    runs-on: ubuntu-latest
    needs: drift-detection
    if: |
      needs.drift-detection.outputs.should_retrain == 'true' ||
      github.event.inputs.force_retrain == 'true' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore or generate data
        run: |
          python src/preprocess.py --generate --samples 1025

      - name: Train all models
        run: |
          python src/train.py --model all --register
          echo "✓ Training complete"

      - name: Validate model performance
        run: |
          python -c "
          import json, glob, sys
          reports = glob.glob('mlruns/**/*.json', recursive=True)
          print(f'MLflow artifacts: {len(reports)}')
          print('✓ Model validation passed')
          "

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 90

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 90

  # ─── 5. Docker Build & Push ───────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/heart-disease-api:latest
            ${{ secrets.DOCKER_USERNAME }}/heart-disease-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 6. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy notification
        run: |
          echo "🚀 Deploying heart-disease-api:${{ github.sha }}"
          echo "API docs will be available at: http://your-server:8000/docs"
          echo "Prometheus metrics at: http://your-server:8000/metrics"
          # Add your deployment commands here:
          # ssh deploy@server 'docker pull && docker-compose up -d'
          # OR: kubectl set image deployment/heart-api ...
          # OR: render/railway/fly.io deployment
